name: CI and Deploy

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'bugfix/**'
  pull_request:
    branches:
      - main
      - 'feature/**'
      - 'bugfix/**'
  delete:
    branches:
      - 'feature/**'
      - 'bugfix/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    outputs:
      is_preview: ${{ steps.context.outputs.is_preview }}
      preview_dir: ${{ steps.context.outputs.preview_dir }}
      base_path: ${{ steps.context.outputs.base_path }}
      is_main: ${{ steps.context.outputs.is_main }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Identify Context
        id: context
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "is_preview=false" >> "$GITHUB_OUTPUT"
            echo "is_main=true" >> "$GITHUB_OUTPUT"
            echo "preview_dir=" >> "$GITHUB_OUTPUT"
            echo "base_path=/parallax/" >> "$GITHUB_OUTPUT"
          else
            preview_slug=$(printf '%s' "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' | sed 's#/#-#g')
            echo "is_preview=true" >> "$GITHUB_OUTPUT"
            echo "is_main=false" >> "$GITHUB_OUTPUT"
            echo "preview_dir=previews/${preview_slug}" >> "$GITHUB_OUTPUT"
            echo "base_path=/parallax/previews/${preview_slug}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests & Coverage
        run: npm run coverage

      - name: Build Project
        run: npm run build -- --base=${{ steps.context.outputs.base_path }}

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./dist
          retention-days: 1

  deploy:
    needs: test-and-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Fetch all branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune

      - name: Get active branches
        id: branches
        run: |
          active_branches=$(git for-each-ref --format='%(refname:strip=3)' refs/remotes/origin \
            | grep -E '^(feature/|bugfix/)' \
            | sort)
          echo "branches<<EOF" >> "$GITHUB_OUTPUT"
          echo "$active_branches" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Install Dependencies
        run: npm ci

      - name: Build main site
        run: npm run build -- --base=/parallax/

      - name: Create output directory
        run: mkdir -p output

      - name: Copy main build to output
        run: cp -r dist/* output/

      - name: Build all previews
        if: needs.test-and-build.outputs.is_main == 'true'
        run: |
          branches="${{ steps.branches.outputs.branches }}"
          if [ -z "$branches" ]; then
            echo "No feature/bugfix branches found, skipping previews"
            exit 0
          fi
          
          while IFS= read -r branch; do
            [ -z "$branch" ] && continue
            echo "Building preview for: $branch"
            
            slug=$(printf '%s' "$branch" | tr '[:upper:]' '[:lower:]' | sed 's#/#-#g')
            base_path="/parallax/previews/${slug}/"
            
            git checkout "$branch"
            
            npm run build -- --base="$base_path"
            
            mkdir -p "output/previews/${slug}"
            cp -r dist/* "output/previews/${slug}/"
            
            git checkout main
          done <<< "$branches"

      - name: Copy .github folder
        run: cp -r .github output/

      - name: Clone pages branch
        run: |
          git clone --branch pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git pages_dir || \
          git clone --depth 1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git pages_dir

      - name: Copy build to pages branch
        run: |
          rm -rf pages_dir/*
          cp -r output/* pages_dir/

      - name: Commit and push
        working-directory: pages_dir
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: update from ${{ github.ref_name }}" || echo "Nothing to deploy"
          git push origin HEAD:pages

  prune-deleted-preview:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch' && (startsWith(github.event.ref, 'feature/') || startsWith(github.event.ref, 'bugfix/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: pages

      - name: Remove Deleted Branch Preview
        run: |
          preview_slug=$(printf '%s' "${{ github.event.ref }}" | tr '[:upper:]' '[:lower:]' | sed 's#/#-#g')

          if ! git ls-remote --heads origin pages | grep -q 'refs/heads/pages$'; then
            echo "pages branch does not exist yet; nothing to prune."
            exit 0
          fi

          git clone --branch pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git pages_dir
          cd pages_dir

          if [ -d "previews/${preview_slug}" ]; then
            echo "Pruning deleted branch preview: previews/${preview_slug}"
            rm -rf "previews/${preview_slug}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: prune deleted preview ${preview_slug}" || echo "Nothing to prune"
            git push origin pages
          else
            echo "No preview folder found for previews/${preview_slug}"
          fi